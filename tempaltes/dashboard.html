<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f0f4f8;
    }
  </style>
</head>

<body class="flex flex-col items-center min-h-screen p-4">

  <div class="w-full max-w-4xl bg-white p-8 rounded-lg shadow-xl mt-8">

    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold text-gray-800">
        Welcome, <span id="username-display"></span>!
      </h1>

      <button id="logout-btn"
        class="px-4 py-2 bg-red-500 text-white font-semibold rounded-md hover:bg-red-600">
        Logout
      </button>
    </div>

    <p class="text-gray-600 mb-8 text-lg">Choose an option:</p>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

      <!-- TEST -->
      <a href="/test"
        class="bg-white p-6 rounded-lg shadow-lg hover:shadow-xl text-center">
        <h2 class="text-xl font-semibold">Get Test</h2>
      </a>

      <!-- REPORT -->
      <a href="/report"
        class="bg-white p-6 rounded-lg shadow-lg hover:shadow-xl text-center">
        <h2 class="text-xl font-semibold">See Report</h2>
      </a>

      <!-- APPOINTMENT -->
      <a href="/appointment"
        class="bg-white p-6 rounded-lg shadow-lg hover:shadow-xl text-center">
        <h2 class="text-xl font-semibold">Doctor Appointment</h2>
      </a>

    </div>
  </div>

<script>
document.addEventListener('DOMContentLoaded', () => {

  const token = localStorage.getItem('token');
  const username = localStorage.getItem('username');

  if (!token) {
    window.location.href = '/';   // ✅ FIXED
    return;
  }

  document.getElementById('username-display').textContent = username || '';

  document.getElementById('logout-btn').addEventListener('click', () => {
    localStorage.clear();
    window.location.href = '/';   // ✅ FIXED
  });

});
</script>

</body>
</html>
