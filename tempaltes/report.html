<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Reports</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
    body {
        font-family: 'Inter', sans-serif;
        background-color: #f0f4f8;
    }

    .modal {
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.4);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .modal-content {
        background: white;
        padding: 20px;
        border-radius: 8px;
        width: 90%;
        max-width: 400px;
        text-align: center;
    }
</style>
</head>

<body class="flex flex-col items-center min-h-screen p-4">

<div class="w-full max-w-3xl bg-white p-8 rounded-lg shadow-xl mt-8">
    <h1 class="text-3xl font-bold text-center mb-6">Your Past Reports</h1>

    <div id="message" class="message-box hidden"></div>

    <div id="reports-list">
        <p class="text-center text-gray-500">Loading reports...</p>
    </div>

    <div class="flex justify-center mt-8">
        <a href="./dashboard.html" class="btn-secondary">Back to Dashboard</a>
    </div>
</div>

<!-- Modal -->
<div id="confirmationModal" class="modal hidden">
    <div class="modal-content">
        <p class="mb-4 text-lg">Are you sure you want to delete this report?</p>
        <button id="confirmDeleteBtn" class="btn-danger">Yes, Delete</button>
        <button id="cancelDeleteBtn" class="btn-secondary mt-2">Cancel</button>
    </div>
</div>

<script>
const BASE_URL = "https://YOUR-BACKEND.onrender.com";

const reportsListDiv = document.getElementById('reports-list');
const messageBox = document.getElementById('message');
const modal = document.getElementById('confirmationModal');

let reportIdToDelete = null;

function showMessage(msg, type) {
    messageBox.textContent = msg;

    messageBox.classList.remove("hidden");

    messageBox.className =
        `p-3 mt-4 rounded-md text-sm ${
            type === 'success'
                ? 'bg-green-100 text-green-700 border border-green-200'
                : 'bg-red-100 text-red-700 border border-red-200'
        }`;

    setTimeout(() => {
        messageBox.classList.add("hidden");
    }, 4000);
}

async function fetchReports() {
    const token = localStorage.getItem('token');

    if (!token) {
        window.location.href = "./index.html";
        return;
    }

    try {
        const res = await fetch(`${BASE_URL}/api/reports`, {
            method: "GET",
            headers: {
                "x-access-token": token,
                "Content-Type": "application/json"
            }
        });

        if (res.status === 401) {
            localStorage.clear();
            window.location.href = "./index.html";
            return;
        }

        const data = await res.json();

        reportsListDiv.innerHTML = "";

        if (!data.length) {
            reportsListDiv.innerHTML =
                "<p class='text-center text-gray-500'>No reports found.</p>";
            return;
        }

        data.forEach(report => {
            const div = document.createElement("div");
            div.className = "bg-white p-6 rounded-lg shadow mb-4 flex justify-between";

            div.innerHTML = `
                <div>
                    <h2 class="font-bold text-lg">
                        ${report.predicted_disorder}
                    </h2>

                    <p class="text-sm text-gray-500">
                        ${report.report_date}
                    </p>

                    <p class="text-sm">
                        Symptoms: ${report.symptoms_selected.join(", ")}
                    </p>
                </div>

                <div>
                    <button class="bg-red-500 text-white px-3 py-1 rounded delete-btn"
                        data-id="${report.id}">
                        Delete
                    </button>
                </div>
            `;

            reportsListDiv.appendChild(div);
        });

        document.querySelectorAll(".delete-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                reportIdToDelete = e.target.dataset.id;
                modal.classList.remove("hidden");
            });
        });

    } catch (err) {
        console.error(err);
        showMessage("Failed to load reports", "error");
    }
}

async function deleteReport(id) {
    const token = localStorage.getItem('token');

    try {
        const res = await fetch(`${BASE_URL}/api/delete_report/${id}`, {
            method: "DELETE",
            headers: {
                "x-access-token": token
            }
        });

        const data = await res.json();

        if (res.ok) {
            showMessage("Report deleted", "success");
            fetchReports();
        } else {
            showMessage(data.message || "Delete failed", "error");
        }

    } catch (err) {
        showMessage("Server error", "error");
    }
}

document.getElementById("confirmDeleteBtn").addEventListener("click", () => {
    if (reportIdToDelete) {
        deleteReport(reportIdToDelete);
        reportIdToDelete = null;
    }
    modal.classList.add("hidden");
});

document.getElementById("cancelDeleteBtn").addEventListener("click", () => {
    reportIdToDelete = null;
    modal.classList.add("hidden");
});

fetchReports();
</script>

</body>
</html>
