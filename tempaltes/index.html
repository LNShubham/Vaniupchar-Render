  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Voice Disorder App - Login/Signup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f0f4f8;
      }
    </style>
  </head>
  <body class="flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-md">
      <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">Voice Disorder App</h1>

      <div id="message" class="p-3 mt-4 rounded-md text-sm hidden"></div>

      <!-- Login Form -->
      <div id="login-form">
        <h2 class="text-2xl font-semibold text-gray-700 mb-4">Login</h2>
        <div class="mb-4">
          <label for="login-username" class="block text-gray-700 text-sm font-bold mb-2">Username:</label>
          <input type="text" id="login-username" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter your username">
        </div>
        <div class="mb-6">
          <label for="login-password" class="block text-gray-700 text-sm font-bold mb-2">Password:</label>
          <input type="password" id="login-password" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter your password">
        </div>
        <button id="login-btn" class="w-full px-4 py-2 bg-blue-600 text-white font-semibold rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition duration-200 mb-4">Login</button>
        <p class="text-center text-gray-600">Don't have an account? <a href="#" id="show-signup" class="text-blue-600 hover:underline">Sign Up</a></p>
      </div>

      <!-- Signup Form -->
      <div id="signup-form" class="hidden">
        <h2 class="text-2xl font-semibold text-gray-700 mb-4">Sign Up</h2>
        <div class="mb-4">
          <label for="signup-username" class="block text-gray-700 text-sm font-bold mb-2">Username:</label>
          <input type="text" id="signup-username" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Choose a username">
        </div>
        <div class="mb-6">
          <label for="signup-password" class="block text-gray-700 text-sm font-bold mb-2">Password:</label>
          <input type="password" id="signup-password" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Choose a password">
        </div>
        <button id="signup-btn" class="w-full px-4 py-2 bg-blue-600 text-white font-semibold rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition duration-200 mb-4">Sign Up</button>
        <p class="text-center text-gray-600">Already have an account? <a href="#" id="show-login" class="text-blue-600 hover:underline">Login</a></p>
      </div>
    </div>

    <script>
  const BASE_URL = "https://YOUR-BACKEND.onrender.com";

  const loginForm = document.getElementById('login-form');
  const signupForm = document.getElementById('signup-form');
  const showSignupBtn = document.getElementById('show-signup');
  const showLoginBtn = document.getElementById('show-login');
  const loginBtn = document.getElementById('login-btn');
  const signupBtn = document.getElementById('signup-btn');
  const messageBox = document.getElementById('message');

  function showMessage(msg, type) {
    messageBox.textContent = msg;
    messageBox.className =
      `p-3 mt-4 rounded-md text-sm ${
        type === 'success'
          ? 'bg-green-100 text-green-700 border border-green-200'
          : 'bg-red-100 text-red-700 border border-red-200'
      }`;

    messageBox.classList.remove('hidden');

    setTimeout(() => {
      messageBox.classList.add('hidden');
    }, 3000);
  }

  showSignupBtn.addEventListener('click', (e) => {
    e.preventDefault();
    loginForm.classList.add('hidden');
    signupForm.classList.remove('hidden');
    messageBox.classList.add('hidden');
  });

  showLoginBtn.addEventListener('click', (e) => {
    e.preventDefault();
    signupForm.classList.add('hidden');
    loginForm.classList.remove('hidden');
    messageBox.classList.add('hidden');
  });

  loginBtn.addEventListener('click', async () => {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;

    if (!username || !password) {
      showMessage('Please fill in both fields.', 'error');
      return;
    }

    try {
      const response = await fetch(`${BASE_URL}/api/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await response.json();

      if (response.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('username', data.username);
        showMessage('Login successful! Redirecting...', 'success');

        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1000);

      } else {
        showMessage(data.message || 'Login failed.', 'error');
      }
    } catch (err) {
      console.error(err);
      showMessage('Server not reachable.', 'error');
    }
  });

  signupBtn.addEventListener('click', async () => {
    const username = document.getElementById('signup-username').value.trim();
    const password = document.getElementById('signup-password').value;

    if (!username || !password) {
      showMessage('Please fill in both fields.', 'error');
      return;
    }

    try {
      const response = await fetch(`${BASE_URL}/api/signup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await response.json();

      if (response.ok) {
        showMessage('Signup successful! Please login.', 'success');
        signupForm.classList.add('hidden');
        loginForm.classList.remove('hidden');

        document.getElementById('login-username').value = username;
        document.getElementById('login-password').value = '';
      } else {
        showMessage(data.message || 'Signup failed.', 'error');
      }
    } catch (err) {
      console.error(err);
      showMessage('Server not reachable.', 'error');
    }
  });
</script>
  </body>
  </html>
