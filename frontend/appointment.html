<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Doctor Appointment</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f4f8; /* Light blue-gray background */
        }

        /* ✅ Wrap @apply directives within a @layer */
        @layer components {
            .form-input {
                @apply w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500;
            }
            .btn-primary {
                @apply px-6 py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition duration-200 ease-in-out;
            }
            .btn-secondary {
                @apply px-6 py-3 bg-gray-300 text-gray-800 font-semibold rounded-lg hover:bg-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-400 focus:ring-offset-2 transition duration-200 ease-in-out;
            }
            .message-box {
                @apply p-3 mt-4 rounded-md text-sm;
            }
            .message-box.success {
                @apply bg-green-100 text-green-700 border border-green-200;
            }
            .message-box.error {
                @apply bg-red-100 text-red-700 border border-red-200;
            }
        }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen p-4">
    <div class="w-full max-w-xl bg-white p-8 rounded-lg shadow-xl mt-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">Book Doctor Appointment</h1>

        <div id="message" class="message-box hidden"></div>

        <div class="mb-4">
            <label for="disorder-input" class="block text-gray-700 text-sm font-bold mb-2">Your Predicted Disorder:</label>
            <input type="text" id="disorder-input" class="form-input" placeholder="e.g., Laryngitis" readonly>
            <input type="hidden" id="latest-report-id"> <!-- Hidden field to store the latest report ID -->
            <p class="text-gray-500 text-xs mt-1">This field will be pre-filled from your latest report.</p>
        </div>

        <div id="appointment-details" class="hidden bg-blue-50 p-4 rounded-md border border-blue-200 mb-6">
            <h2 class="text-xl font-semibold text-blue-800 mb-2">Appointment Confirmed!</h2>
            <p class="text-blue-700 mb-1"><strong>Doctor:</strong> <span id="booked-doctor-name"></span> (<span id="booked-doctor-specialty"></span>)</p>
            <p class="text-blue-700 mb-1"><strong>Date:</strong> <span id="booked-appointment-date"></span></p>
            <p class="text-blue-700"><strong>Time:</strong> <span id="booked-appointment-time"></span></p>
            <p class="text-blue-600 text-sm mt-2">Please check your email for further details (mock).</p>
        </div>

        <div class="flex justify-center gap-4">
            <button id="book-appointment-btn" class="btn-primary">Book Appointment</button>
            <a href="./dashboard.html" class="btn-secondary">Back to Dashboard</a>
        </div>
    </div>

    <script>
        const disorderInput = document.getElementById('disorder-input');
        const latestReportIdInput = document.getElementById('latest-report-id');
        const bookAppointmentBtn = document.getElementById('book-appointment-btn');
        const messageBox = document.getElementById('message');
        const appointmentDetailsDiv = document.getElementById('appointment-details');
        const bookedDoctorName = document.getElementById('booked-doctor-name');
        const bookedDoctorSpecialty = document.getElementById('booked-doctor-specialty');
        const bookedAppointmentDate = document.getElementById('booked-appointment-date');
        const bookedAppointmentTime = document.getElementById('booked-appointment-time');

        function showMessage(msg, type) {
            messageBox.textContent = msg;
            messageBox.className = `message-box ${type}`;
            messageBox.classList.remove('hidden');
            setTimeout(() => {
                messageBox.classList.add('hidden');
            }, 5000);
        }

        async function populateDisorderAndReportId() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = './index.html';
                return;
            }

            try {
                const response = await fetch('http://127.0.0.1:5000/api/reports', {
                    method: 'GET',
                    headers: {
                        'x-access-token': token,
                        'Content-Type': 'application/json',
                    },
                });

                if (response.status === 401) {
                    showMessage('Session expired or unauthorized. Please log in again.', 'error');
                    localStorage.removeItem('token');
                    localStorage.removeItem('username');
                    setTimeout(() => {
                        window.location.href = './index.html';
                    }, 1500);
                    return;
                }

                const data = await response.json();

                if (response.ok && data.length > 0) {
                    // Get the latest predicted disorder and its report ID
                    disorderInput.value = data[0].predicted_disorder;
                    latestReportIdInput.value = data[0].id; // Store the report ID
                    if (data[0].appointment) {
                        // If an appointment already exists for this report, show it and disable booking
                        appointmentDetailsDiv.classList.remove('hidden');
                        bookedDoctorName.textContent = data[0].appointment.doctor_name;
                        bookedDoctorSpecialty.textContent = data[0].appointment.doctor_specialty;
                        bookedAppointmentDate.textContent = data[0].appointment.date;
                        bookedAppointmentTime.textContent = data[0].appointment.time;
                        bookAppointmentBtn.disabled = true;
                        bookAppointmentBtn.textContent = 'Appointment Already Booked';
                        showMessage('An appointment for your latest report is already booked.', 'info');
                    } else {
                        bookAppointmentBtn.disabled = false;
                        bookAppointmentBtn.textContent = 'Book Appointment';
                    }
                } else {
                    disorderInput.value = 'No recent prediction found';
                    latestReportIdInput.value = ''; // Clear report ID
                    showMessage('No recent test report found. Please take a test first.', 'error');
                    bookAppointmentBtn.disabled = true; // Disable booking if no report
                }
            } catch (error) {
                console.error('Error fetching reports for disorder:', error);
                disorderInput.value = 'Error fetching disorder';
                latestReportIdInput.value = '';
                showMessage('An error occurred while fetching your disorder. Check console for details.', 'error');
                bookAppointmentBtn.disabled = true;
            }
        }

        bookAppointmentBtn.addEventListener('click', async () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = './index.html';
                return;
            }

            const disorder = disorderInput.value;
            const reportId = latestReportIdInput.value; // Get the report ID

            if (!disorder || disorder === 'No recent prediction found' || disorder === 'Error fetching disorder' || !reportId) {
                showMessage('Please ensure a disorder is predicted and a report exists before booking an appointment.', 'error');
                return;
            }

            try {
                const response = await fetch('http://127.0.0.1:5000/api/book_appointment', {
                    method: 'POST',
                    headers: {
                        'x-access-token': token,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ disorder: disorder, report_id: reportId }), // Send report_id
                });

                if (response.status === 401) {
                    showMessage('Session expired or unauthorized. Please log in again.', 'error');
                    localStorage.removeItem('token');
                    localStorage.removeItem('username');
                    setTimeout(() => {
                        window.location.href = './index.html';
                    }, 1500);
                    return;
                }

                const data = await response.json();

                if (response.ok) {
                    showMessage(data.message, 'success');
                    appointmentDetailsDiv.classList.remove('hidden');
                    bookedDoctorName.textContent = data.doctor_name;
                    bookedDoctorSpecialty.textContent = data.doctor_specialty;
                    bookedAppointmentDate.textContent = data.appointment_date;
                    bookedAppointmentTime.textContent = data.appointment_time;
                    bookAppointmentBtn.disabled = true; // Prevent multiple bookings
                    bookAppointmentBtn.textContent = 'Appointment Booked';
                } else {
                    showMessage(data.message || 'Failed to book appointment.', 'error');
                    appointmentDetailsDiv.classList.add('hidden');
                }
            } catch (error) {
                console.error('Error booking appointment:', error);
                showMessage('An error occurred during appointment booking. Check console for details.', 'error');
                appointmentDetailsDiv.classList.add('hidden');
            }
        });

        populateDisorderAndReportId(); // Populate disorder input and report ID when page loads
    </script>
</body>
</html>
