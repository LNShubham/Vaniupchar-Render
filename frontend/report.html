<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Reports</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f4f8; /* Light blue-gray background */
        }
        .report-card {
            @apply bg-white p-6 rounded-lg shadow-md mb-4;
        }
        .btn-secondary {
            @apply px-6 py-3 bg-gray-300 text-gray-800 font-semibold rounded-lg hover:bg-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-400 focus:ring-offset-2 transition duration-200 ease-in-out;
        }
        .btn-danger {
            @apply px-4 py-2 bg-red-500 text-white font-semibold rounded-md hover:bg-red-600 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 transition duration-200 ease-in-out;
        }
        .message-box {
            @apply p-3 mt-4 rounded-md text-sm;
        }
        .message-box.success {
            @apply bg-green-100 text-green-700 border border-green-200;
        }
        .message-box.error {
            @apply bg-red-100 text-red-700 border border-red-200;
        }
        /* Custom Modal Styles */
        .modal {
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background-color: #fefefe;
            margin: auto;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .modal-buttons {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen p-4">
    <div class="w-full max-w-3xl bg-white p-8 rounded-lg shadow-xl mt-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">Your Past Reports</h1>

        <div id="message" class="message-box hidden"></div>

        <div id="reports-list">
            <p class="text-gray-500 text-center">Loading reports...</p>
        </div>

        <div class="flex justify-center mt-8">
            <a href="./dashboard.html" class="btn-secondary">Back to Dashboard</a>
        </div>
    </div>

    <!-- Custom Confirmation Modal -->
    <div id="confirmationModal" class="modal hidden">
        <div class="modal-content">
            <p class="text-lg mb-4">Are you sure you want to delete this report?</p>
            <div class="modal-buttons">
                <button id="confirmDeleteBtn" class="btn-danger">Yes, Delete</button>
                <button id="cancelDeleteBtn" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const reportsListDiv = document.getElementById('reports-list');
        const messageBox = document.getElementById('message');
        const confirmationModal = document.getElementById('confirmationModal');
        const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');
        const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
        let reportIdToDelete = null; // Variable to store the ID of the report to be deleted

        function showMessage(msg, type) {
            messageBox.textContent = msg;
            messageBox.className = `message-box ${type}`;
            messageBox.classList.remove('hidden');
            setTimeout(() => {
                messageBox.classList.add('hidden');
            }, 5000);
        }

        async function fetchReports() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = './index.html';
                return;
            }

            try {
                const response = await fetch('http://127.0.0.1:5000/api/reports', {
                    method: 'GET',
                    headers: {
                        'x-access-token': token,
                        'Content-Type': 'application/json',
                    },
                });

                if (response.status === 401) {
                    showMessage('Session expired or unauthorized. Please log in again.', 'error');
                    localStorage.removeItem('token');
                    localStorage.removeItem('username');
                    setTimeout(() => {
                        window.location.href = './index.html';
                    }, 1500);
                    return;
                }

                const data = await response.json();

                if (response.ok) {
                    reportsListDiv.innerHTML = ''; // Clear loading message
                    if (data.length === 0) {
                        reportsListDiv.innerHTML = '<p class="text-gray-600 text-center">No reports found yet. Take a test!</p>';
                        return;
                    }
                    data.forEach(report => {
                        const reportCard = document.createElement('div');
                        reportCard.className = 'report-card flex justify-between items-start';
                        let appointmentDetails = '';
                        let finishAppointmentButton = '';

                        if (report.appointment) {
                            appointmentDetails = `
                                <p class="text-gray-700 text-sm mt-2 font-semibold">Doctor Appointment:</p>
                                <p class="text-gray-600 text-sm ml-4">Doctor: <span class="font-medium">${report.appointment.doctor_name}</span> (${report.appointment.doctor_specialty})</p>
                                <p class="text-gray-600 text-sm ml-4">Date: <span class="font-medium">${report.appointment.date}</span></p>
                                <p class="text-gray-600 text-sm ml-4">Time: <span class="font-medium">${report.appointment.time}</span></p>
                                <p class="text-gray-600 text-sm ml-4">Status: <span class="font-medium capitalize">${report.appointment.status}</span></p>
                            `;
                            if (report.appointment.status === 'pending') {
                                finishAppointmentButton = `
                                    <button class="btn-secondary mt-2 text-sm finish-appointment-btn" data-appointment-id="${report.appointment.id}">Finish Appointment</button>
                                `;
                            }
                        }

                        reportCard.innerHTML = `
                            <div>
                                <p class="text-lg font-semibold text-gray-800 mb-2">Predicted Disorder: <span class="text-blue-600">${report.predicted_disorder}</span></p>
                                <p class="text-gray-600 text-sm mb-1">Date: ${report.report_date}</p>
                                <p class="text-gray-600 text-sm">Symptoms Selected: <span class="font-medium">${report.symptoms_selected.join(', ')}</span></p>
                                ${appointmentDetails}
                            </div>
                            <div class="flex flex-col items-end">
                                <button class="btn-danger delete-report-btn" data-report-id="${report.id}">Delete Report</button>
                                ${finishAppointmentButton}
                            </div>
                        `;
                        reportsListDiv.appendChild(reportCard);
                    });

                    // Attach event listeners to new buttons
                    document.querySelectorAll('.delete-report-btn').forEach(button => {
                        button.addEventListener('click', (event) => {
                            reportIdToDelete = event.target.dataset.reportId;
                            confirmationModal.classList.remove('hidden');
                        });
                    });

                    document.querySelectorAll('.finish-appointment-btn').forEach(button => {
                        button.addEventListener('click', async (event) => {
                            const appointmentId = event.target.dataset.appointmentId;
                            await finishAppointment(appointmentId);
                        });
                    });

                } else {
                    showMessage(data.message || 'Failed to load reports.', 'error');
                }
            } catch (error) {
                console.error('Error fetching reports:', error);
                showMessage('An error occurred while fetching reports. Check console for details.', 'error');
            }
        }

        async function deleteReport(reportId) {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = './index.html';
                return;
            }

            try {
                const response = await fetch(`http://127.0.0.1:5000/api/delete_report/${reportId}`, {
                    method: 'DELETE',
                    headers: {
                        'x-access-token': token,
                        'Content-Type': 'application/json',
                    },
                });

                if (response.status === 401) {
                    showMessage('Session expired or unauthorized. Please log in again.', 'error');
                    localStorage.removeItem('token');
                    localStorage.removeItem('username');
                    setTimeout(() => {
                        window.location.href = './index.html';
                    }, 1500);
                    return;
                }

                const data = await response.json();

                if (response.ok) {
                    showMessage(data.message, 'success');
                    fetchReports(); // Refresh the list
                } else {
                    showMessage(data.message || 'Failed to delete report.', 'error');
                }
            } catch (error) {
                console.error('Error deleting report:', error);
                showMessage('An error occurred while deleting the report. Check console for details.', 'error');
            }
        }

        async function finishAppointment(appointmentId) {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = './index.html';
                return;
            }

            try {
                const response = await fetch('http://127.0.0.1:5000/api/finish_appointment', {
                    method: 'POST',
                    headers: {
                        'x-access-token': token,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ appointment_id: appointmentId }),
                });

                if (response.status === 401) {
                    showMessage('Session expired or unauthorized. Please log in again.', 'error');
                    localStorage.removeItem('token');
                    localStorage.removeItem('username');
                    setTimeout(() => {
                        window.location.href = './index.html';
                    }, 1500);
                    return;
                }

                const data = await response.json();

                if (response.ok) {
                    showMessage(data.message, 'success');
                    fetchReports(); // Refresh the list to update status
                } else {
                    showMessage(data.message || 'Failed to finish appointment.', 'error');
                }
            } catch (error) {
                console.error('Error finishing appointment:', error);
                showMessage('An error occurred while finishing the appointment. Check console for details.', 'error');
            }
        }

        // Modal event listeners
        confirmDeleteBtn.addEventListener('click', () => {
            if (reportIdToDelete) {
                deleteReport(reportIdToDelete);
                reportIdToDelete = null; // Reset
            }
            confirmationModal.classList.add('hidden');
        });

        cancelDeleteBtn.addEventListener('click', () => {
            reportIdToDelete = null; // Reset
            confirmationModal.classList.add('hidden');
        });

        fetchReports(); // Load reports when the page loads
    </script>
</body>
</html>
