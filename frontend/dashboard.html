<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f0f4f8;
    }
  </style>
</head>
<body class="flex flex-col items-center min-h-screen p-4">
  <div class="w-full max-w-4xl bg-white p-8 rounded-lg shadow-xl mt-8">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold text-gray-800">Welcome, <span id="username-display"></span>!</h1>
      <button id="logout-btn"
        class="px-4 py-2 bg-red-500 text-white font-semibold rounded-md hover:bg-red-600 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 transition duration-200 ease-in-out">
        Logout
      </button>
    </div>

    <p class="text-gray-600 mb-8 text-lg">Choose an option to get started:</p>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <a href="test.html"
        class="bg-white p-6 rounded-lg shadow-lg hover:shadow-xl transition-shadow duration-300 ease-in-out cursor-pointer flex flex-col items-center justify-center text-center">
        <svg class="text-blue-600 mb-4 w-16 h-16" fill="currentColor" viewBox="0 0 20 20"
          xmlns="http://www.w3.org/2000/svg">
          <path fill-rule="evenodd"
            d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"
            clip-rule="evenodd"></path>
        </svg>
        <h2 class="text-xl font-semibold text-gray-700">Get Test</h2>
        <p class="text-gray-500 text-sm mt-2">Check your symptoms and get a disorder prediction.</p>
      </a>

      <a href="report.html"
        class="bg-white p-6 rounded-lg shadow-lg hover:shadow-xl transition-shadow duration-300 ease-in-out cursor-pointer flex flex-col items-center justify-center text-center">
        <svg class="text-blue-600 mb-4 w-16 h-16" fill="currentColor" viewBox="0 0 20 20"
          xmlns="http://www.w3.org/2000/svg">
          <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"></path>
          <path fill-rule="evenodd"
            d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 000-2H7zm3 0a1 1 0 000 2h.01a1 1 0 000-2H10zm3 0a1 1 0 000 2h.01a1 1 0 000-2H13zm-3 4a1 1 0 000 2h.01a1 1 0 000-2H10z"
            clip-rule="evenodd"></path>
        </svg>
        <h2 class="text-xl font-semibold text-gray-700">See Report</h2>
        <p class="text-gray-500 text-sm mt-2">View your past test results and predicted disorders.</p>
      </a>

      <a href="appointment.html"
        class="bg-white p-6 rounded-lg shadow-lg hover:shadow-xl transition-shadow duration-300 ease-in-out cursor-pointer flex flex-col items-center justify-center text-center">
        <svg class="text-blue-600 mb-4 w-16 h-16" fill="currentColor" viewBox="0 0 20 20"
          xmlns="http://www.w3.org/2000/svg">
          <path fill-rule="evenodd"
            d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z"
            clip-rule="evenodd"></path>
        </svg>
        <h2 class="text-xl font-semibold text-gray-700">Doctor Appointment</h2>
        <p class="text-gray-500 text-sm mt-2">Book an appointment with a specialist.</p>
      </a>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('token');
      const username = localStorage.getItem('username');
      const usernameDisplay = document.getElementById('username-display');
      const logoutBtn = document.getElementById('logout-btn');

      if (!token) {
        window.location.href = './index.html'; // Redirect to login if no token
        return;
      }

      if (username) {
        usernameDisplay.textContent = username;
      }

      logoutBtn.addEventListener('click', () => {
        localStorage.removeItem('token');
        localStorage.removeItem('username');
        window.location.href = './index.html'; // Redirect to login after logout
      });
    });
  </script>
</body>
</html>
